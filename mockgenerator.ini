# MockGenerator Konfiguration
# Dieses File einmal anlegen und im Repo versionieren.

[project]
cmake_root = FileStructureExample/CodeRoot

# Pfad zum Test-CMakeLists.txt, relativ zu cmake_root (Default: tests/CMakeLists.txt)
test_cmake_lists = tests/CMakeLists.txt

# Regex zum Erkennen fehlender Symbole im Build-Log (ein capture group = Symbolname)
# Default passt für GCC/ld. Bei anderem Compiler hier anpassen.
# [log_parser]
# symbol_pattern = undefined reference to `([^']+)'

[search]
# Verzeichnisse die beim Header-Scan ignoriert werden (relativ zu cmake_root)
# Mehrere Einträge: jede weitere Zeile einrücken
exclude_dirs =

# CMake-Variablen die in include_directories()-Pfaden vorkommen (z.B. ${Variant})
# [cmake_vars]
# Variant = VariantA

[output]
# mode: "file" = .txt Ausgabe | "inplace" = direkt ins Testfile
mode = file
output_dir = mocks_out
test_file_prefixes =
    TestUnit_
    TestIntegration_
