# MockGenerator Configuration
# Create this file once and commit it to the repository.

[project]
cmake_root = FileStructureExample/CodeRoot

# Path to the test CMakeLists.txt, relative to cmake_root (default: tests/CMakeLists.txt)
test_cmake_lists = tests/CMakeLists.txt

# Root directory for test files, relative to cmake_root (default: tests)
tests_root = tests

# Regex for detecting missing symbols in the build log (one capture group = symbol name)
# Default matches GCC/ld output. Adjust here if using a different compiler.
# [log_parser]
# symbol_pattern = undefined reference to `([^']+)'

[search]
# Directories to exclude from header scanning (relative to cmake_root)
# Multiple entries: indent each additional line
exclude_dirs =

# CMake variables used in include_directories() paths (e.g. ${Variant})
# [cmake_vars]
# Variant = VariantA

[output]
# mode: "file" = write to .txt output file | "inplace" = inject directly into test file
mode = file
output_dir = mocks_out
test_file_prefixes =
    TestUnit_
    TestIntegration_

# Hint comment appended to generated variable mocks (max 80 characters).
# Useful for IDE plugins that highlight specific patterns (e.g. TODO, MOCK).
# mock_variable_hint = /* MOCK: verify initial value */
# mock_variable_hint = /* TODO: Generated initialisation of unknown Type */

# Regex patterns identifying the mock section boundaries (inplace mode only).
# mock_section_start: first matching line marks the start of the mock section.
# mock_section_end:   first matching line after the start is the injection point.
#
# Default (Doxygen @defgroup style):
# mock_section_start = @defgroup.*Mocks
# mock_section_end = ^\s*/\*\*
#
# Alternative (explicit comment markers):
# mock_section_start = /\* Start of generated mocks \*/
# mock_section_end = /\* End of generated mocks \*/
